<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>gamblor — World Cup 2026</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 680px; margin: 1.5rem auto;
           padding: 0 1rem; line-height: 1.4; }
    h1 { margin-bottom: .2rem; }
    .sub { color: #888; margin-top: 0; font-size: .9rem; }
    .bar { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center;
           justify-content: space-between; margin: 1rem 0; }
    button { padding: .55rem .9rem; border-radius: .5rem; border: 0; background: #1463ff;
             color: #fff; font-weight: 600; font-size: .95rem; cursor: pointer; }
    button.secondary { background: rgba(127,127,127,.2); color: inherit; }
    #msg { color: #888; font-size: .9rem; }
    .hidden { display: none; }

    /* Gamblor Round tiles */
    .tile { border: 1px solid rgba(127,127,127,.28); border-radius: .8rem;
            padding: 0 .9rem .6rem; margin: 1.1rem 0;
            background: rgba(127,127,127,.04); }
    .tile-head { display: flex; align-items: flex-start; justify-content: space-between;
                 gap: .5rem; padding: .7rem .1rem .5rem;
                 border-bottom: 2px solid rgba(127,127,127,.22); margin-bottom: .2rem; }
    .tile-title { font-size: 1.1rem; font-weight: 800; margin: 0; }
    .tile-toggle { display: inline-flex; align-items: center; gap: .4rem; background: none;
                   border: 0; padding: 0; margin: 0; font: inherit; color: inherit;
                   cursor: pointer; text-align: left; }
    .tile-toggle .chev { display: inline-flex; color: #888; transition: transform .15s ease; }
    .tile.collapsed .tile-toggle .chev { transform: rotate(-90deg); }
    .tile.collapsed .tile-head { border-bottom-color: transparent; margin-bottom: 0;
                                 padding-bottom: .35rem; }
    .tile.collapsed .tile-body { display: none; }
    .tile-range { color: #888; font-size: .8rem; margin-top: .15rem; }
    .tile-range .done { color: #16a34a; }
    .copy-btn { flex: none; background: transparent; color: #888;
                border: 1px solid rgba(127,127,127,.35); border-radius: .5rem;
                padding: .35rem; margin-top: .1rem; cursor: pointer; line-height: 0;
                display: inline-flex; align-items: center; justify-content: center; }
    .copy-btn:hover { color: inherit; background: rgba(127,127,127,.12); }
    .copy-btn.copied { color: #16a34a; border-color: #16a34a; }

    /* Fixture list */
    .fx { display: grid; grid-template-columns: 1fr auto; gap: .2rem .75rem;
          align-items: center; padding: .6rem .2rem;
          border-bottom: 1px solid rgba(127,127,127,.18); }
    .fx .teams { font-weight: 600; }
    .fx .teams .tbd { color: #999; font-weight: 500; font-style: italic; }
    .fx .meta { grid-column: 1; color: #888; font-size: .78rem; }
    .fx .score { font-variant-numeric: tabular-nums; font-weight: 700;
                 font-size: 1.05rem; text-align: right; white-space: nowrap; }
    .fx .when { color: #888; font-size: .8rem; text-align: right; white-space: nowrap; }
    .badge { font-size: .68rem; font-weight: 700; padding: .1rem .4rem; border-radius: .35rem;
             text-transform: uppercase; letter-spacing: .02em; vertical-align: middle; }
    .badge.live { background: #dc2626; color: #fff; }
    .badge.ft { background: rgba(127,127,127,.25); color: inherit; }

    /* Login */
    .login { max-width: 320px; margin: 2rem auto; }
    .login label { display: block; font-size: .85rem; font-weight: 600; margin: .8rem 0 .3rem; }
    .login input { width: 100%; box-sizing: border-box; padding: .6rem .7rem; font-size: 1rem;
                   border: 1px solid rgba(127,127,127,.45); border-radius: .5rem;
                   background: transparent; color: inherit; }
    .login button { width: 100%; margin-top: 1.2rem; padding: .7rem; }
    #login-error { color: #dc2626; font-size: .85rem; min-height: 1.2em; margin-top: .6rem; }
  </style>
</head>
<body>
  <h1>⚽ World Cup 2026</h1>
  <p class="sub">Every fixture &amp; result — updated daily.</p>

  <!-- Login view -->
  <section id="login-view" class="hidden">
    <form class="login" id="login-form">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username"
             autocapitalize="none" autofocus required />
      <label for="password">Password</label>
      <input id="password" name="password" type="password"
             autocomplete="current-password" required />
      <button type="submit" id="login-btn">Sign in</button>
      <p id="login-error"></p>
    </form>
  </section>

  <!-- App view (fixtures + results) -->
  <section id="app-view" class="hidden">
    <div class="bar">
      <span id="msg">Loading…</span>
      <button id="logout" class="secondary">Log out</button>
    </div>
    <div id="list"></div>
  </section>

  <script>
    const TOKEN_KEY = 'gamblor_token';
    const loginView = document.getElementById('login-view');
    const appView = document.getElementById('app-view');
    const loginForm = document.getElementById('login-form');
    const loginError = document.getElementById('login-error');
    const loginBtn = document.getElementById('login-btn');
    const msg = document.getElementById('msg');
    const list = document.getElementById('list');

    function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }

    function showLogin() {
      appView.classList.add('hidden');
      loginView.classList.remove('hidden');
      document.getElementById('username').focus();
    }

    function showApp() {
      loginView.classList.add('hidden');
      appView.classList.remove('hidden');
      load();
    }

    // Returns true (valid), false (definitively invalid → 401), or
    // null (network/server error → keep the token, don't force re-login).
    async function tokenIsValid(token) {
      if (!token) return false;
      try {
        const r = await fetch('/api/login?token=' + encodeURIComponent(token));
        if (r.status === 401) return false;
        if (!r.ok) return null;
        const j = await r.json();
        return !!j.ok;
      } catch (e) {
        return null;
      }
    }

    // --- Login ---------------------------------------------------------------
    loginForm.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      loginError.textContent = '';
      loginBtn.disabled = true;
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const j = await r.json();
        if (!j.ok) throw new Error(j.error || 'Login failed');
        localStorage.setItem(TOKEN_KEY, j.token);
        loginForm.reset();
        showApp();
      } catch (e) {
        loginError.textContent = e.message;
      } finally {
        loginBtn.disabled = false;
      }
    });

    document.getElementById('logout').onclick = () => {
      localStorage.removeItem(TOKEN_KEY);
      showLogin();
    };

    // --- Fixtures + results --------------------------------------------------
    function esc(s) {
      return String(s).replace(/[&<>"']/g, c => (
        {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // Icon-only copy button assets (inline SVG, inherit text colour).
    const COPY_ICON = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" ' +
      'stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ' +
      'aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/>' +
      '<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    const CHECK_ICON = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" ' +
      'stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" ' +
      'aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>';
    // Chevron points down when expanded; CSS rotates it -90° when collapsed.
    const CHEVRON_ICON = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" ' +
      'stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" ' +
      'aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>';

    // Serialisable match detail for the per-round copy payload.
    function matchDetail(f) {
      return {
        date: f.date,
        round: f.round,
        group: f.group,
        home_team: f.home_team,
        away_team: f.away_team,
        state: f.state,
        status: f.status,
        home_goals: f.home_goals,
        away_goals: f.away_goals,
        venue: f.venue,
        city: f.city,
      };
    }

    function roundPayload(round, items) {
      return {
        gamblor_round: round.n,
        dates: round.label,
        match_count: items.length,
        matches: items.map(matchDetail),
      };
    }

    function flashCopied(btn, ok) {
      if (!ok) { btn.title = 'Copy failed'; return; }
      btn.classList.add('copied');
      btn.innerHTML = CHECK_ICON;
      setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = COPY_ICON; }, 1200);
    }

    function writeClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text).then(() => true, () => legacyCopy(text));
      }
      return Promise.resolve(legacyCopy(text));
    }

    function legacyCopy(text) {
      try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.position = 'absolute';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        return ok;
      } catch (e) {
        return false;
      }
    }

    function makeCopyButton(round, items) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'copy-btn';
      btn.title = `Copy Gamblor Round ${round.n} matches as JSON`;
      btn.setAttribute('aria-label', btn.title);
      btn.innerHTML = COPY_ICON;
      btn.addEventListener('click', () => {
        const text = JSON.stringify(roundPayload(round, items), null, 2);
        writeClipboard(text).then(ok => flashCopied(btn, ok));
      });
      return btn;
    }

    function team(name) {
      return name ? esc(name) : '<span class="tbd">TBD</span>';
    }

    function fmtKickoff(iso) {
      if (!iso) return 'Date TBD';
      const d = new Date(iso);
      return isNaN(d) ? esc(iso) : d.toLocaleString([], {
        weekday: 'short', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit' });
    }

    function rightCol(f) {
      if (f.state === 'finished' || f.state === 'live') {
        const hg = f.home_goals == null ? '–' : f.home_goals;
        const ag = f.away_goals == null ? '–' : f.away_goals;
        const badge = f.state === 'live'
          ? `<span class="badge live">${esc(f.status || 'Live')}</span>`
          : `<span class="badge ft">FT</span>`;
        return `<div class="score">${hg}–${ag} ${badge}</div>`;
      }
      return `<div class="when">${fmtKickoff(f.date)}</div>`;
    }

    // Custom "Gamblor Round" groupings, by the match's New Zealand (Auckland)
    // calendar date. The ranges below are inclusive Auckland dates. All 104
    // matches fall within them: the 11 Jun (US) opener is 12 Jun in Auckland,
    // and the 19 Jul (US) final is 20 Jul in Auckland.
    const GAMBLOR_ROUNDS = [
      { n: 1,  start: '2026-06-12', end: '2026-06-14', label: '12–14 Jun' },
      { n: 2,  start: '2026-06-15', end: '2026-06-18', label: '15–18 Jun' },
      { n: 3,  start: '2026-06-19', end: '2026-06-21', label: '19–21 Jun' },
      { n: 4,  start: '2026-06-22', end: '2026-06-25', label: '22–25 Jun' },
      { n: 5,  start: '2026-06-26', end: '2026-06-28', label: '26–28 Jun' },
      { n: 6,  start: '2026-06-29', end: '2026-07-02', label: '29 Jun – 2 Jul' },
      { n: 7,  start: '2026-07-03', end: '2026-07-04', label: '3–4 Jul' },
      { n: 8,  start: '2026-07-05', end: '2026-07-08', label: '5–8 Jul' },
      { n: 9,  start: '2026-07-09', end: '2026-07-12', label: '9–12 Jul' },
      { n: 10, start: '2026-07-13', end: '2026-07-16', label: '13–16 Jul' },
      { n: 11, start: '2026-07-17', end: '2026-07-20', label: '17–20 Jul' },
    ];

    // The match's calendar date in Auckland (NZ), as YYYY-MM-DD. Built from the
    // kickoff instant via Intl so DST is handled and the viewer's own timezone
    // never shifts a match into an adjacent round.
    const AKL_PARTS = new Intl.DateTimeFormat('en-US', {
      timeZone: 'Pacific/Auckland', year: 'numeric', month: '2-digit', day: '2-digit' });
    function aucklandDate(iso) {
      const d = new Date(iso);
      if (isNaN(d)) return (iso || '').slice(0, 10);  // fallback: raw date part
      const p = Object.fromEntries(AKL_PARTS.formatToParts(d).map(x => [x.type, x.value]));
      return `${p.year}-${p.month}-${p.day}`;
    }

    // Map a fixture to its Gamblor Round by its Auckland date.
    function gamblorRound(f) {
      const last = GAMBLOR_ROUNDS[GAMBLOR_ROUNDS.length - 1];
      if (!f.date) return last;
      const d = aucklandDate(f.date);
      for (const r of GAMBLOR_ROUNDS) {
        if (d >= r.start && d <= r.end) return r;
      }
      // Outside every range (shouldn't happen for WC 2026): clamp to first/last.
      return d < GAMBLOR_ROUNDS[0].start ? GAMBLOR_ROUNDS[0] : last;
    }

    function fixtureRow(f) {
      // Keep the original groupings (matchday/knockout round + group) in the meta.
      const meta = [f.round, f.group, f.venue, f.city].filter(Boolean).join(' · ');
      const row = document.createElement('div');
      row.className = 'fx';
      row.innerHTML =
        `<div class="teams">${team(f.home_team)} <span style="color:#888">v</span> ${team(f.away_team)}</div>
         ${rightCol(f)}
         ${meta ? `<div class="meta">${esc(meta)}</div>` : ''}`;
      return row;
    }

    function render(fixtures) {
      // Bucket fixtures into Gamblor Rounds (input is already sorted by kickoff).
      const buckets = new Map();
      for (const f of fixtures) {
        const r = gamblorRound(f);
        if (!buckets.has(r.n)) buckets.set(r.n, { round: r, items: [] });
        buckets.get(r.n).items.push(f);
      }
      // Build the whole list in a fragment, then insert once (one reflow).
      const fragment = document.createDocumentFragment();
      for (const n of [...buckets.keys()].sort((a, b) => a - b)) {
        const { round, items } = buckets.get(n);
        // A round is "complete" when every match in it has been played; those
        // start collapsed, all others start expanded.
        const complete = items.length > 0 && items.every(f => f.state === 'finished');
        const bodyId = `tile-body-${round.n}`;

        const tile = document.createElement('section');
        tile.className = 'tile' + (complete ? ' complete collapsed' : '');

        const head = document.createElement('div');
        head.className = 'tile-head';
        const heading = document.createElement('div');
        heading.innerHTML =
          `<h2 class="tile-title">
             <button type="button" class="tile-toggle" aria-expanded="${complete ? 'false' : 'true'}" aria-controls="${bodyId}">
               <span class="chev">${CHEVRON_ICON}</span>
               <span>Gamblor Round ${round.n}</span>
             </button>
           </h2>
           <div class="tile-range">${esc(round.label)} · ${items.length} ${items.length === 1 ? 'match' : 'matches'}${complete ? ' · <span class="done">✓ complete</span>' : ''}</div>`;
        head.appendChild(heading);
        head.appendChild(makeCopyButton(round, items));
        tile.appendChild(head);

        const body = document.createElement('div');
        body.className = 'tile-body';
        body.id = bodyId;
        for (const f of items) body.appendChild(fixtureRow(f));
        tile.appendChild(body);

        const toggle = heading.querySelector('.tile-toggle');
        toggle.addEventListener('click', () => {
          const collapsed = tile.classList.toggle('collapsed');
          toggle.setAttribute('aria-expanded', String(!collapsed));
        });

        fragment.appendChild(tile);
      }
      list.innerHTML = '';
      list.appendChild(fragment);
    }

    async function load() {
      msg.textContent = 'Loading fixtures…';
      list.innerHTML = '';
      try {
        const r = await fetch('/api/wc');
        const j = await r.json();
        if (!j.ok) throw new Error(j.error || 'failed');
        if (!j.fixtures.length) {
          msg.textContent = 'No fixtures stored yet — the daily update will populate them.';
          return;
        }
        const upd = j.updated_at ? new Date(j.updated_at) : null;
        msg.textContent = `${j.count} matches` +
          (upd && !isNaN(upd) ? ` · updated ${upd.toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}` : '');
        render(j.fixtures);
      } catch (e) {
        msg.textContent = 'Error: ' + e.message;
      }
    }

    // --- Boot ----------------------------------------------------------------
    (async () => {
      const valid = await tokenIsValid(getToken());
      if (valid === true) {
        showApp();
      } else if (valid === false) {
        localStorage.removeItem(TOKEN_KEY);
        showLogin();
      } else {
        // Network/server error — keep the token and let the user retry.
        appView.classList.remove('hidden');
        msg.textContent = 'Connection error. Please refresh to try again.';
      }
    })();
  </script>
</body>
</html>
